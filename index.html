<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track personal expenses and visualize spending patterns with interactive charts">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>Expense & Budget Visualizer</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
                        <span class="sun-icon">☀️</span>
                        <span class="moon-icon">🌙</span>
                    </button>
                </div>
            </div>
            <div class="header-stats">
                <section id="balance-display" role="region" aria-labelledby="balance-heading">
                    <h2 id="balance-heading">Total Spending</h2>
                    <div class="balance-amount" role="status" aria-live="polite">$0.00</div>
                </section>
                <section id="limit-manager" role="region" aria-labelledby="limit-heading">
                    <h2 id="limit-heading">Spending Limit</h2>
                    <div class="limit-input-group">
                        <span>$</span>
                        <input type="number" id="spending-limit" placeholder="Set limit" step="10" min="0">
                    </div>
                </section>
            </div>
        </header>
        
        <main>
            <section class="input-section">
                <form id="expense-form" role="form" aria-labelledby="form-heading">
                    <h2 id="form-heading">Add New Expense</h2>
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" name="itemName" required 
                               aria-describedby="item-name-error" aria-invalid="false"
                               placeholder="Enter item name">
                        <span class="error-message" id="item-name-error" role="alert" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required 
                               aria-describedby="amount-error" aria-invalid="false" 
                               placeholder="0.00">
                        <span class="error-message" id="amount-error" role="alert" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <div class="category-input-wrapper">
                            <select id="category" name="category" required 
                                    aria-describedby="category-error" aria-invalid="false">
                                <option value="">Select Category</option>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Fun">Fun</option>
                            </select>
                            <button type="button" id="add-category-btn" class="secondary-btn" title="Add custom category">+</button>
                        </div>
                        <span class="error-message" id="category-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <div id="custom-category-modal" class="modal" style="display: none;">
                        <div class="modal-content">
                            <h3>Add Custom Category</h3>
                            <input type="text" id="new-category-name" placeholder="Category name">
                            <div class="modal-actions">
                                <button type="button" id="cancel-category" class="text-btn">Cancel</button>
                                <button type="button" id="save-category" class="primary-btn">Add</button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Add Transaction</button>
                </form>
            </section>
            
            <section class="visualization-section">
                <h2>Spending Breakdown</h2>
                <div class="chart-container">
                    <canvas id="expense-chart" role="img" aria-label="Pie chart showing expense distribution by category"></canvas>
                    <div class="chart-empty-state" style="display: none;" role="status" aria-live="polite">
                        <p>Add some expenses to see your spending breakdown!</p>
                    </div>
                </div>
            </section>
            
            <section class="transaction-section">
                <section id="transaction-list" role="region" aria-labelledby="transaction-heading">
                    <div class="section-header">
                        <h3 id="transaction-heading">Transaction History</h3>
                        <div class="sort-controls">
                            <label for="sort-by" class="sr-only">Sort transactions by</label>
                            <select id="sort-by" class="sort-select">
                                <option value="date-desc">Newest First</option>
                                <option value="date-asc">Oldest First</option>
                                <option value="amount-desc">Highest Amount</option>
                                <option value="amount-asc">Lowest Amount</option>
                                <option value="category-asc">Category (A-Z)</option>
                                <option value="category-desc">Category (Z-A)</option>
                            </select>
                        </div>
                    </div>
                    <div class="transaction-container" role="list">
                        <!-- Dynamic transaction items will be inserted here -->
                    </div>
                    <div class="empty-state" style="display: block;" role="status" aria-live="polite">
                        <p>No transactions yet. Add your first expense above!</p>
                    </div>
                </section>
            </section>
        </main>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
